# =============================================================================
# Docker Compose - OpsRamp ChatBot
# =============================================================================
#
# SERVICES:
#   ollama - Local LLM server (runs Mistral model for tool-calling)
#   app    - The conversational operations agent
#
# NO API KEYS NEEDED! Everything runs locally with mock OpsRamp data.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama - Local LLM Server
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-ops-agent
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ---------------------------------------------------------------------------
  # OpsRamp ChatBot
  # ---------------------------------------------------------------------------
  app:
    build: .
    container_name: opsramp-agent
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=mistral
    stdin_open: true # Keep stdin open for interactive CLI
    tty: true # Allocate a pseudo-TTY

volumes:
  ollama_data:
